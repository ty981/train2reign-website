<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Train2Reign — Payment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0A0A;
      color: #F5F5F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
    }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
    p { font-size: 16px; color: #888; margin-bottom: 36px; line-height: 1.5; max-width: 320px; }
    .btn {
      display: inline-block;
      background: #1a47b8;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
    }
    .success h1 { color: #FFD700; }
    .cancel h1 { color: #F5F5F0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="success-view" class="hidden">
    <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#FFD700" stroke-width="3"/>
      <polyline points="20,34 28,42 44,24" stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Payment Successful!</h1>
    <p>Your Train2Reign Pro subscription is now active. Welcome to the next level.</p>
    <a href="https://train2reignapp.com" class="btn">Return to Train2Reign</a>
  </div>

  <div id="cancel-view" class="hidden">
    <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#888888" stroke-width="3"/>
      <line x1="22" y1="22" x2="42" y2="42" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
      <line x1="42" y1="22" x2="22" y2="42" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <h1>Payment Cancelled</h1>
    <p>Your payment was cancelled. No charge was made.</p>
    <a href="https://train2reignapp.com" class="btn">Return to Train2Reign</a>
  </div>

  <script>
    var result = new URLSearchParams(window.location.search).get('result') === 'cancel' ? 'cancel' : 'success';
    document.getElementById(result + '-view').classList.remove('hidden');
  </script>
</body>
</html>
